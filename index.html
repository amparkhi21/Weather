<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="weather-container">
    <h1 id="h">Weather Forecast</h1>

    <div class="first">
      <h3 id="chead"></h3>
      <div id="temp"></div>
    </div>

    <div class="search">
      <input type="text" id="city" placeholder="Enter city">
      <button id="btn">Search</button>
    </div>

    <div class="grid">
      <div class="card">  
        <h3>Wind <i class="fa-solid fa-wind"></i></h3>
        <p id="wind">--km/h</p>
      </div>
      <div class="card">
        <h3>Humidity <i class="fa-solid fa-droplet"></i></h3>
        <p id="humidity">--%</p>
      </div>
      <div class="card">
        <h3>Temperature <i class="fa-solid fa-temperature-high"></i> </h3>
        <p id="temperature">-- C</p>
      </div>
      <div class="card">
        <h3>Condition <i class="fa-solid fa-cloud"></i></h3>
        <p id="condition">--</p>
      </div>
    </div>
  </div>

  <div class="container">
    <h1 id="h">Weekly Forecast</h1>
    <div id="weekly-forecast"></div>
  </div>
  
  <div class="weekly-details">
    <h1 id="h">Weather Details</h1>
    <div id="details">
      <div class="detail">
        <p>🌅</p>
        <h3>Sunrise</h3><br>
        <p id="sunrise"></p>
      </div>
      <div class="detail">  
        <p>🌙</p>
        <h3>Sunset</h3><br>
        <p id="sunset"></p>
      </div>
      <div class="detail">  
        <p>🌫️</p>
        <h3>Visibility</h3><br>
        <p id="visibility"></p>
      </div>
      <div class="detail"> 
        <p>💧</p> 
        <h3>Humidity</h3><br>
        <p id="hum"></p>
      </div>
      <div class="detail">  
        <p>🌬️</p>
        <h3>Wind</h3><br>
        <p id="w"></p>
      </div>
      <div class="detail">  
        <p>📊</p>
        <h3>Pressure</h3><br>
        <p id="pressure"></p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
